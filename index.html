<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBG Labs — Software & Systems</title>
<meta name="description" content="HBG Labs builds software products and provides development and infrastructure services.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='2' y='2' width='44' height='44' rx='10' fill='%23111'/%3E%3Ctext x='24' y='33' text-anchor='middle' font-family='system-ui' font-size='20' font-weight='800' fill='%23fafafa'%3Ehbg%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #111111;
    --dark: #1a1a1a;
    --mid: #555555;
    --soft: #999999;
    --border: #e0e0e0;
    --light: #f5f5f5;
    --white: #fafafa;
    --page: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: var(--page);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === LAYOUT === */
  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
  }

  /* === SUBTLE GRID TEXTURE === */
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* === CONTENT === */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 520px;
  }

  /* === LOGO MARK === */
  .logo-mark {
    width: 72px;
    height: 72px;
    margin: 0 auto 32px;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }

  .logo-mark svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.06));
  }

  /* === WORDMARK === */
  .wordmark {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: var(--black);
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }

  /* === DIVIDER === */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
  }

  /* === DESCRIPTION === */
  .description {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--mid);
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  /* === SERVICES === */
  .services {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
  }

  .service-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--mid);
    background: var(--light);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    transition: all 0.25s ease;
  }

  .service-tag:hover {
    color: var(--black);
    border-color: var(--black);
    background: var(--page);
  }

  /* === CONTACT === */
  .contact {
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
  }

  .contact a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--black);
    text-decoration: none;
    padding: 12px 28px;
    border: 1.5px solid var(--black);
    border-radius: 8px;
    transition: all 0.25s ease;
    display: inline-block;
  }

  .contact a:hover {
    background: var(--black);
    color: var(--white);
  }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  footer p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--soft);
    text-transform: uppercase;
  }

  /* === ANIMATIONS === */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* === RESPONSIVE === */
  @media (max-width: 480px) {
    .wordmark { font-size: 34px; }
    .description { font-size: 15px; }
    .logo-mark { width: 60px; height: 60px; }
    .services { gap: 8px; }
    .service-tag { font-size: 10px; padding: 6px 12px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="content">

    <div class="logo-mark">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="44" height="44" rx="10" fill="#111111"/>
        <text x="24" y="33" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="800" fill="#fafafa" letter-spacing="-1">hbg</text>
      </svg>
    </div>

    <h1 class="wordmark">HBG Labs</h1>
    <p class="tagline">Software &amp; Systems</p>

    <div class="divider"></div>

    <p class="description">
      We build software products and deliver development and infrastructure services. Currently in the lab — more coming soon.
    </p>

    <div class="services">
      <span class="service-tag">SaaS Products</span>
      <span class="service-tag">App Development</span>
      <span class="service-tag">DevOps</span>
      <span class="service-tag">Consulting</span>
    </div>

    <div class="contact">
      <a href="mailto:chris@hbglabs.com">Get in touch</a>
    </div>

  </div>
</div>

<footer>
  <p>&copy; 2026 HBG Labs LLC &middot; Virginia</p>
</footer>

</body>
</html>
